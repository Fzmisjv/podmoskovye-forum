<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Подмосковье RP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0d0e12; color: #fff; min-height: 100vh; }
        
        /* Шапка */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: #16181e; border-bottom: 1px solid #2d3748; }
        .logo { font-weight: bold; font-size: 20px; color: #ff7a00; cursor: pointer; }
        nav a { color: #a0aec0; text-decoration: none; margin-left: 20px; font-size: 14px; transition: 0.3s; }
        nav a:hover { color: #fff; }

        /* Контейнер профиля */
        .profile-container { max-width: 700px; margin: 40px auto; background: #16181e; padding: 40px; border-radius: 20px; border: 1px solid #2d3748; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar-section { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        #avatar-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #ff7a00; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #718096; font-size: 12px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; background: #22252d; border: 1px solid #3d4657; color: #fff; border-radius: 10px; }
        
        /* Кнопки ссылок */
        .link-btn { display: inline-block; padding: 8px 15px; margin-top: 10px; background: #2d3748; color: #fff; text-decoration: none; border-radius: 8px; font-size: 12px; transition: 0.3s; }
        .link-btn:hover { background: #4a5568; color: #ff7a00; }
        
        .save-btn { width: 100%; padding: 15px; background: #ff7a00; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .save-btn:hover { background: #e66e00; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="window.location.href='/feed.html'">ПОДМОСКОВЬЕ RP</div>
    <nav>
        <a href="/feed.html">Форум</a>
        <a href="/profile.html">Профиль</a>
        <a href="#" onclick="localStorage.clear(); window.location.href='/index.html';">Выйти</a>
    </nav>
</header>

<div class="profile-container">
    <div class="avatar-section">
        <img id="avatar-preview" src="https://i.imgur.com/6VBx3io.png" alt="Аватар">
        <div>
            <h3>Настройка профиля</h3>
            <input type="file" id="file-input" accept="image/*" style="margin-top: 10px; background: none; border: none;">
        </div>
    </div>

    <form id="profile-form">
        <div class="form-group"><label>Никнейм</label><input type="text" id="username"></div>
        
        <div class="form-group">
            <label>Discord</label>
            <input type="text" id="discord" placeholder="User#1234">
            <a id="discord-link" class="link-btn" href="#" target="_blank" style="display:none;">Перейти в Discord</a>
        </div>
        
        <div class="form-group">
            <label>Roblox</label>
            <input type="text" id="roblox" placeholder="Nickname">
            <a id="roblox-link" class="link-btn" href="#" target="_blank" style="display:none;">Профиль Roblox</a>
        </div>
        
        <div class="form-group"><label>О себе / Статус</label><textarea id="bio"></textarea></div>
        <button type="submit" class="save-btn">СОХРАНИТЬ ДАННЫЕ</button>
    </form>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    let base64Avatar = "";

    // Загрузка фото
    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            base64Avatar = event.target.result;
            document.getElementById('avatar-preview').src = base64Avatar;
        };
        reader.readAsDataURL(file);
    });

    // Загрузка данных профиля
    async function loadData() {
        if (!user) return;
        const res = await fetch(`/user/profile/${user.id}`);
        const data = await res.json();
        
        document.getElementById('username').value = data.username || '';
        document.getElementById('discord').value = data.discord_name || '';
        document.getElementById('roblox').value = data.roblox_name || '';
        document.getElementById('bio').value = data.bio || '';
        
        if(data.avatar) { 
            document.getElementById('avatar-preview').src = data.avatar; 
            base64Avatar = data.avatar; 
        }

        // Логика кнопок-ссылок
        const dLink = document.getElementById('discord-link');
        if (data.discord_name) {
            dLink.style.display = 'inline-block';
            dLink.href = `https://discord.com/users/${data.discord_name}`; 
        }
        
        const rLink = document.getElementById('roblox-link');
        if (data.roblox_name) {
            rLink.style.display = 'inline-block';
            rLink.href = `https://www.roblox.com/search/users?keyword=${data.roblox_name}`;
        }
    }

    // Сохранение
    document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        await fetch('/user/profile/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: user.id,
                username: document.getElementById('username').value,
                avatar: base64Avatar,
                bio: document.getElementById('bio').value,
                discord_name: document.getElementById('discord').value,
                roblox_name: document.getElementById('roblox').value
            })
        });
        alert('Данные сохранены!');
        location.reload(); // Перезагружаем страницу, чтобы обновились кнопки
    };

    loadData();
</script>
</body>
</html>
