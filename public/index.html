<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подмосковье RP - Вход / Регистрация</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #14151a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Эффект темного стекла (Dark Glass / Industrial) */
        .auth-container {
            background: rgba(20, 22, 28, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        h2 span {
            color: #ff7a00;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff7a00;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff7a00;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: #e06c00;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .switch-mode {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        .switch-mode span {
            color: #ff7a00;
            cursor: pointer;
            text-decoration: underline;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .message.error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="form-title">Войти в <span>Аккаунт</span></h2>
    
    <form id="auth-form">
        <div class="form-group">
            <label for="email">Email адрес</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="submit-btn">Войти</button>
    </form>

    <div class="message" id="msg-box"></div>

    <div class="switch-mode">
        <span id="toggle-mode" data-mode="login">Создать новый аккаунт</span>
    </div>
</div>

<script>
    const form = document.getElementById('auth-form');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleMode = document.getElementById('toggle-mode');
    const msgBox = document.getElementById('msg-box');

    // Переключение между Входом и Регистрацией
    toggleMode.addEventListener('click', () => {
        const currentMode = toggleMode.getAttribute('data-mode');
        msgBox.style.display = 'none';

        if (currentMode === 'login') {
            formTitle.innerHTML = 'Создать <span>Аккаунт</span>';
            submitBtn.textContent = 'Зарегистрироваться';
            toggleMode.textContent = 'Уже есть аккаунт? Войти';
            toggleMode.setAttribute('data-mode', 'register');
        } else {
            formTitle.innerHTML = 'Войти в <span>Аккаунт</span>';
            submitBtn.textContent = 'Войти';
            toggleMode.textContent = 'Создать новый аккаунт';
            toggleMode.setAttribute('data-mode', 'login');
        }
    });

    // Обработка отправки формы
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msgBox.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const mode = toggleMode.getAttribute('data-mode');

        const url = mode === 'login' ? '/login' : '/register';

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                msgBox.textContent = data.error || 'Что-то пошло не так';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
            } else {
                msgBox.textContent = data.message;
                msgBox.className = 'message success';
                msgBox.style.display = 'block';
                form.reset();

                if (mode === 'login') {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    msgBox.textContent += ' Перенаправление...';
                    
                    // Перенаправление на страницу нашего игрового форума (feed.html)
                    setTimeout(() => {
                        window.location.href = '/feed.html';
                    }, 500);
                }
            }
        } catch (err) {
            msgBox.textContent = 'Не удалось связаться с сервером';
            msgBox.className = 'message error';
            msgBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
