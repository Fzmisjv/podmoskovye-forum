<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль пользователя | Подмосковье RP</title>
    <style>
        body { background: #0d0e12; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; }
        .card { background: #16181e; padding: 40px; border-radius: 20px; border: 1px solid #2d3748; width: 400px; text-align: center; }
        #avatar { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ff7a00; object-fit: cover; margin-bottom: 20px; }
        h2 { margin-bottom: 10px; }
        p { color: #a0aec0; margin-bottom: 20px; }
        .links { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 10px; background: #2d3748; color: white; text-decoration: none; border-radius: 8px; }
        .btn:hover { background: #ff7a00; }
    </style>
</head>
<body>

<div class="card">
    <img id="avatar" src="https://i.imgur.com/6VBx3io.png" alt="Аватар">
    <h2 id="username">Загрузка...</h2>
    <p id="bio"></p>
    <div class="links">
        <a id="discord-link" class="btn" style="display:none;" target="_blank">Discord</a>
        <a id="roblox-link" class="btn" style="display:none;" target="_blank">Roblox</a>
    </div>
</div>

<script>
    async function loadPublicProfile() {
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        
        if (!userId) return document.body.innerHTML = "Пользователь не найден";

        const res = await fetch(`/user/public/${userId}`);
        const data = await res.json();

        if (data.error) return document.body.innerHTML = "Пользователь не найден";

        document.getElementById('username').textContent = data.username;
        document.getElementById('avatar').src = data.avatar || 'https://i.imgur.com/6VBx3io.png';
        document.getElementById('bio').textContent = data.bio || 'Нет описания.';

        if (data.discord_name) {
            const dLink = document.getElementById('discord-link');
            dLink.style.display = 'block';
            dLink.textContent = `Discord: ${data.discord_name}`;
            dLink.href = `https://discord.com/users/${data.discord_name}`;
        }
        
        if (data.roblox_name) {
            const rLink = document.getElementById('roblox-link');
            rLink.style.display = 'block';
            rLink.textContent = `Roblox: ${data.roblox_name}`;
            rLink.href = `https://www.roblox.com/search/users?keyword=${data.roblox_name}`;
        }
    }
    loadPublicProfile();
</script>
</body>
</html>
